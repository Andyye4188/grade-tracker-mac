<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grade Tracker</title>
  <script src="main.js" defer></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>Grade Tracker</h1>
      <span id="header-gpa">GPA: --</span>
    </header>

    <main>
      <!-- Dashboard -->
      <section id="page-dashboard" class="page">
        <h2>Overview</h2>
        <div id="subject-grid" class="grid-bento"></div>
      </section>

      <!-- Add Score -->
      <section id="page-add" class="page" style="display:none">
        <h2>Add Score</h2>
        <form id="score-form">
          <div class="form-group">
            <label>Subject</label>
            <select id="add-subject" required>
              <option value="">-- Select Subject --</option>
              <option>Speech &amp; Debate</option>
              <option>English 7</option>
              <option>Chemistry</option>
              <option>East Asian History</option>
              <option>Chinese 7</option>
              <option>Computer Science 7</option>
              <option>Algebra &amp; Geometry I</option>
              <option>Physics 7</option>
              <option>Biology 7 New</option>
            </select>
          </div>
          <div class="form-group">
            <label>Score</label>
            <input type="number" id="add-score" min="0" step="0.1" placeholder="e.g. 45" required />
          </div>
          <div class="form-group">
            <label>Possible Score</label>
            <input type="number" id="add-possible" min="0" step="0.1" placeholder="e.g. 50" required />
          </div>
          <div class="form-group">
            <label>Type</label>
            <select id="add-type" required>
              <option>Major</option>
              <option>Minor</option>
            </select>
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="add-date" required />
          </div>
          <div class="form-group">
            <label>Note (optional)</label>
            <input type="text" id="add-note" placeholder="e.g. Chapter 5 test" />
          </div>
          <button type="submit">Submit Score</button>
          <p id="add-msg" class="msg"></p>
        </form>
      </section>

      <!-- Stats -->
      <section id="page-stats" class="page" style="display:none">
        <div class="stats-header">
          <h2>Statistics</h2>
          <select id="stats-subject-select">
            <option value="">-- Select Subject --</option>
            <option>Speech &amp; Debate</option>
            <option>English 7</option>
            <option>Chemistry</option>
            <option>East Asian History</option>
            <option>Chinese 7</option>
            <option>Computer Science 7</option>
            <option>Algebra &amp; Geometry I</option>
            <option>Physics 7</option>
            <option>Biology 7 New</option>
          </select>
        </div>
        <div id="stats-summary">
          <div class="stat-card">
            <span class="stat-label">Overall</span>
            <span id="stats-total" class="stat-value">--</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">GPA</span>
            <span id="stats-gpa" class="stat-value">--</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Major (60%)</span>
            <span id="stats-major" class="stat-value">--</span>
          </div>
          <div class="stat-card">
            <span class="stat-label">Minor (40%)</span>
            <span id="stats-minor" class="stat-value">--</span>
          </div>
        </div>
        <div id="stats-debug-info" style="background:#f0f;padding:8px;margin-bottom:12px;font-size:12px;font-family:monospace;color:#000;display:none"></div>
        <div id="stats-list"></div>
        <button id="stats-back" class="btn-secondary">Back to Overview</button>
      </section>

      <!-- Goals -->
      <section id="page-goals" class="page" style="display:none">
        <h2>Goals</h2>
        <div id="goals-list"></div>
      </section>

      <!-- Report -->
      <section id="page-report" class="page" style="display:none">
        <h2>Report</h2>
        <div id="report-gpa" class="gpa-big"><span>GPA:</span> --</div>
        <div class="report-section">
          <h3>Strongest Subjects</h3>
          <div id="report-strongest" class="subjects-row"></div>
        </div>
        <div class="report-section">
          <h3>Needs Attention</h3>
          <div id="report-weakest" class="subjects-row"></div>
        </div>
        <div class="report-section">
          <h3>All Subjects</h3>
          <table id="report-table">
            <thead><tr><th>Subject</th><th>Average</th><th>Count</th><th>Major</th><th>Minor</th></tr></thead>
            <tbody id="report-tbody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <nav>
      <button class="nav-btn active" data-page="dashboard">Dashboard</button>
      <button class="nav-btn" data-page="add">Add</button>
      <button class="nav-btn" data-page="stats">Stats</button>
      <button class="nav-btn" data-page="goals">Goals</button>
      <button class="nav-btn" data-page="report">Report</button>
    </nav>
  </div>

  <div id="toast" class="toast"></div>

  <div id="goal-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:999">
    <div style="background:white;border-radius:12px;padding:24px;width:300px">
      <h3 style="margin-bottom:12px">Set Goal</h3>
      <p id="goal-modal-subj" style="color:#666;margin-bottom:10px;font-size:13px"></p>
      <input id="goal-modal-input" type="number" min="0" max="100" step="0.1" placeholder="Target score" style="width:100%;padding:8px;border:1px solid #E0E0E0;border-radius:6px;font-size:14px;margin-bottom:12px" />
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button onclick="closeGoalModal()" style="padding:8px 16px;border:1px solid #E0E0E0;background:white;border-radius:6px;cursor:pointer">Cancel</button>
        <button onclick="submitGoalModal()" style="padding:8px 16px;background:#C4522A;color:white;border:none;border-radius:6px;cursor:pointer">Save</button>
      </div>
    </div>
  </div>
</body>
</html>
